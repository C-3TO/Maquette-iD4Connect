<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blog · iD4Connect</title>
<meta name="description" content="Insights, analyses et retours d'expérience sur la data intelligence, la souveraineté numérique et l'Insight-as-a-Service.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══ TOKENS ══ */
:root{
  --orange:#F97316;--orange-d:#EA6C0A;--orange-pale:#FFF7ED;--orange-border:#FED7AA;
  --blue:#2563EB;--blue-pale:#EFF6FF;--purple:#8B5CF6;--purple-pale:#F5F3FF;
  --green:#16A34A;--green-pale:#F0FDF4;--cyan:#0891B2;--cyan-pale:rgba(6,182,212,.08);
  --font:'Inter',sans-serif;--r-xs:4px;--r-sm:8px;--r:12px;--r-lg:16px;--r-xl:22px;--r-pill:100px;
  --tr:.16s ease;--hh:64px;
}
:root,[data-theme="light"]{
  --bg:#F5F4F0;--card:#FFFFFF;--section:#EEEDEA;
  --t9:#111827;--t7:#374151;--t5:#6B7280;--t4:#9CA3AF;
  --border:#E5E3DE;--border-s:#D1CFCA;
  --sh-sm:0 1px 3px rgba(0,0,0,.07);--sh:0 4px 16px rgba(0,0,0,.08);--sh-lg:0 14px 44px rgba(0,0,0,.11);
}
[data-theme="dark"]{
  --bg:#0C1221;--card:#162032;--section:#0A0E1A;
  --t9:#F9FAFB;--t7:#D1D5DB;--t5:#9CA3AF;--t4:#4B5563;
  --border:#1F2D3D;--border-s:#2D3F52;
  --sh-sm:0 1px 3px rgba(0,0,0,.3);--sh:0 4px 16px rgba(0,0,0,.3);--sh-lg:0 12px 40px rgba(0,0,0,.4);
  --orange-pale:rgba(249,115,22,.10);--orange-border:rgba(249,115,22,.22);
  --blue-pale:rgba(37,99,235,.10);--purple-pale:rgba(139,92,246,.10);--green-pale:rgba(22,163,74,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--t9);-webkit-font-smoothing:antialiased;padding-top:var(--hh);transition:background .25s,color .25s;}
a{text-decoration:none;color:inherit;}
.wrap{max-width:1060px;margin:0 auto;padding:0 32px;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:var(--orange-pale);border:1px solid var(--orange-border);border-radius:var(--r-pill);font-size:10.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--orange);}
.pill-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);}
.blog-hero{padding:72px 32px 60px;text-align:center;background:var(--bg);position:relative;overflow:hidden;}
.blog-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:52px 52px;opacity:.25;pointer-events:none;}
.hero-content{position:relative;z-index:1;max-width:640px;margin:0 auto;}
.blog-hero h1{font-size:clamp(2.2rem,4.5vw,3.4rem);font-weight:900;line-height:1.08;letter-spacing:-1.5px;color:var(--t9);margin:18px 0 14px;}
.blog-hero h1 em{font-style:normal;color:var(--orange);}
.blog-hero p{font-size:15px;color:var(--t5);line-height:1.75;margin-bottom:36px;}
.search-bar{position:relative;max-width:560px;margin:0 auto 28px;}
.search-bar svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--t4);pointer-events:none;}
#search-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-pill);padding:14px 22px 14px 48px;font-size:14px;font-family:var(--font);color:var(--t9);outline:none;box-shadow:var(--sh-sm);transition:border-color .2s,box-shadow .2s;}
#search-input::placeholder{color:var(--t4);}
#search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.1);}
.filter-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.ftag{padding:8px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;font-family:var(--font);color:var(--t5);background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all var(--tr);}
.ftag:hover{color:var(--t9);border-color:var(--border-s);}
.ftag.active{background:var(--orange);color:#fff;border-color:var(--orange);}
.featured-section{padding:52px 0 0;}
.section-eyebrow{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:20px;}
.eyebrow-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.2);}
.featured-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;display:grid;grid-template-columns:1.1fr 1fr;box-shadow:var(--sh);transition:box-shadow .25s;color:inherit;cursor:pointer;}
.featured-card:hover{box-shadow:var(--sh-lg);}
.feat-img{position:relative;overflow:hidden;min-height:300px;background:var(--section);}
.feat-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease;}
.featured-card:hover .feat-img img{transform:scale(1.04);}
.feat-body{padding:40px 44px;display:flex;flex-direction:column;justify-content:center;}
.feat-cat-badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:var(--r-pill);margin-bottom:18px;align-self:flex-start;}
.feat-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--t4);margin-bottom:14px;}
.feat-meta span{display:flex;align-items:center;gap:5px;}
.feat-meta svg{width:13px;height:13px;}
.feat-body h2{font-size:clamp(20px,2.4vw,28px);font-weight:900;color:var(--t9);line-height:1.25;margin-bottom:14px;letter-spacing:-.4px;}
.feat-body p{font-size:14px;color:var(--t5);line-height:1.8;margin-bottom:26px;}
.feat-author{display:flex;align-items:center;gap:10px;}
.feat-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0;}
.feat-author-name{font-size:13px;font-weight:700;color:var(--t9);}
.feat-author-role{font-size:11px;color:var(--t4);}
.read-link{display:inline-flex;align-items:center;gap:6px;color:var(--orange);font-size:13.5px;font-weight:700;margin-top:22px;transition:gap .15s;}
.read-link:hover{gap:10px;}
.read-link svg{width:14px;height:14px;}
.grid-section{padding:52px 0 88px;}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.blog-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:box-shadow .2s,transform .15s;cursor:pointer;display:block;color:inherit;contain:layout style;}
.blog-card:hover{box-shadow:var(--sh-lg);transform:translateY(-3px);}
.blog-card.hidden{display:none;}
.card-img{height:188px;overflow:hidden;position:relative;background:var(--section);}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .45s ease;}
.blog-card:hover .card-img img{transform:scale(1.06);}
.card-badge{position:absolute;top:12px;left:12px;font-size:10.5px;font-weight:700;padding:4px 11px;border-radius:var(--r-pill);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);width:fit-content;display:inline-block;}
.badge-tech{background:rgba(37,99,235,.85);color:#fff;}
.badge-secu{background:rgba(139,92,246,.85);color:#fff;}
.badge-secteur{background:rgba(22,163,74,.85);color:#fff;}
.badge-partner{background:rgba(8,145,178,.85);color:#fff;}
.badge-actu{background:rgba(249,115,22,.9);color:#fff;}
.card-body{padding:20px;}
.card-meta-row{display:flex;align-items:center;gap:12px;font-size:11.5px;color:var(--t4);margin-bottom:10px;}
.card-meta-row span{display:flex;align-items:center;gap:4px;}
.card-meta-row svg{width:12px;height:12px;}
.card-title{font-size:15px;font-weight:800;color:var(--t9);line-height:1.35;margin-bottom:9px;}
.card-title a{color:inherit;transition:color .15s;}
.card-title a:hover{color:var(--orange);}
.card-excerpt{font-size:12.5px;color:var(--t5);line-height:1.68;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-author{display:flex;align-items:center;gap:8px;}
.card-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:10px;flex-shrink:0;}
.card-author-name{font-size:12px;font-weight:700;color:var(--t9);}
.av-tech{background:#2563EB;}.av-secu{background:#8B5CF6;}.av-secteur{background:#16A34A;}.av-partner{background:#0891B2;}.av-actu{background:#F97316;}
.bc-tech{background:var(--blue-pale);color:#2563EB;border:1px solid rgba(37,99,235,.2);}
.bc-secu{background:var(--purple-pale);color:#8B5CF6;border:1px solid rgba(139,92,246,.2);}
.bc-secteur{background:var(--green-pale);color:#16A34A;border:1px solid rgba(22,163,74,.2);}
.bc-partner{background:var(--cyan-pale);color:#0891B2;border:1px solid rgba(8,145,178,.2);}
.bc-actu{background:var(--orange-pale);color:var(--orange);border:1px solid var(--orange-border);}
.no-results{text-align:center;padding:72px 20px;display:none;}
.no-results svg{width:44px;height:44px;color:var(--t4);margin:0 auto 14px;display:block;}
.no-results h3{font-size:16px;font-weight:800;color:var(--t9);margin-bottom:6px;}
.no-results p{font-size:13px;color:var(--t5);}

.btn-o{display:inline-flex;align-items:center;padding:11px 22px;background:var(--orange);color:#fff;font-size:13px;font-weight:700;font-family:var(--font);border-radius:var(--r-sm);border:none;cursor:pointer;transition:background var(--tr);}
.btn-o:hover{background:var(--orange-d);}
@media(max-width:900px){
  .blog-grid{grid-template-columns:repeat(2,1fr);}
  .featured-card{grid-template-columns:1fr;}
  .feat-img{min-height:220px;}
  .feat-body{padding:28px;}
}
@media(max-width:600px){
  .blog-grid{grid-template-columns:1fr;}
  .wrap{padding:0 20px;}
  .blog-hero{padding:52px 20px 48px;}

}
</style>
</head>
<body>
<div id="hdr-ph"></div>

<section class="blog-hero">
  <div class="hero-content">
    <div class="pill"><span class="pill-dot"></span>Blog</div>
    <h1>Insights &amp; <em>Actualités</em></h1>
    <p>Découvrez nos articles sur la data, l'architecture stateless et l'innovation souveraine.</p>
    <div class="search-bar">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5l3 3"/></svg>
      <input id="search-input" type="text" placeholder="Rechercher un article…" autocomplete="off">
    </div>
    <div class="filter-row" id="filter-row">
      <button class="ftag active" data-cat="all">Tous</button>
      <button class="ftag" data-cat="secteur">Industrie</button>
      <button class="ftag" data-cat="securite">Conformité</button>
      <button class="ftag" data-cat="technique">Technologie</button>
      <button class="ftag" data-cat="partenaires">Partenaires</button>
      <button class="ftag" data-cat="actu">Actualités</button>
    </div>
  </div>
</section>

<section class="featured-section" id="featured-section">
  <div class="wrap">
    <div class="section-eyebrow"><span class="eyebrow-dot"></span>Article à la une</div>
    <a href="article.html" class="featured-card" id="featured-card">
      <div class="feat-img" id="feat-img"></div>
      <div class="feat-body">
        <span class="feat-cat-badge" id="feat-badge"></span>
        <div class="feat-meta" id="feat-meta"></div>
        <h2 id="feat-title"></h2>
        <p id="feat-excerpt"></p>
        <div class="feat-author" id="feat-author"></div>
        <span class="read-link">Lire l'article <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg></span>
      </div>
    </a>
  </div>
</section>

<section class="grid-section">
  <div class="wrap">
    <div class="blog-grid" id="blog-grid"></div>
    <div class="no-results" id="no-results">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5l4 4"/></svg>
      <h3>Aucun résultat</h3>
      <p>Essayez un autre mot-clé ou une autre catégorie.</p>
    </div>
  </div>
</section>



<div id="ftr-ph"></div>

<script>
const ARTICLES = [
  {id:1,cat:'secteur',featured:true,title:"Industrie 5.0 : Le rôle crucial de l'IoT intelligent",excerpt:"L'industrie du futur nécessite un traitement des données en temps réel au plus près des capteurs. Retour d'expérience sur des déploiements concrets, entre efficacité opérationnelle et souveraineté des flux de données.",catLabel:'Industrie',catBadgeClass:'bc-secteur',badgeClass:'badge-secteur',avClass:'av-secteur',author:'Équipe iD4Connect',authorInit:'i',authorRole:'Rédaction',date:'26 janvier 2026',read:'6 min',img:'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=900&q=80'},
  {id:2,cat:'securite',featured:false,title:"Souveraineté des données : la promesse européenne",excerpt:"Dans un contexte de tensions géopolitiques, la souveraineté des données devient un enjeu stratégique majeur pour les entreprises européennes.",catLabel:'Conformité',catBadgeClass:'bc-secu',badgeClass:'badge-secu',avClass:'av-secu',author:'Carlos Parrondo',authorInit:'C',authorRole:'Associé',date:'26 janvier 2026',read:'7 min',img:'https://images.unsplash.com/photo-1568992687947-868a62a9f521?w=600&q=80'},
  {id:3,cat:'technique',featured:false,title:"Edge Computing : traiter là où les données naissent",excerpt:"Pourquoi rapprocher le traitement de la source révolutionne les architectures data. Avantages techniques et mise en œuvre avec DataCell.",catLabel:'Technologie',catBadgeClass:'bc-tech',badgeClass:'badge-tech',avClass:'av-tech',author:'Équipe iD4Connect',authorInit:'i',authorRole:'Rédaction',date:'26 janvier 2026',read:'6 min',img:'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=600&q=80'},
  {id:4,cat:'secteur',featured:false,title:"Cas client : une banque européenne réduit son TCO data de 60%",excerpt:"Étude de cas complète : comment un acteur bancaire majeur a transformé son infrastructure data avec iD4Connect, sans migration ni rupture opérationnelle.",catLabel:'Industrie',catBadgeClass:'bc-secteur',badgeClass:'badge-secteur',avClass:'av-secteur',author:'Équipe iD4Connect',authorInit:'i',authorRole:'Rédaction',date:'3 février 2026',read:'10 min',img:'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&q=80'},
  {id:5,cat:'securite',featured:false,title:"Zéro stockage, conformité maximale : l'architecture qui change tout",excerpt:"En ne stockant aucune donnée, iD4Connect évite structurellement les obligations de déclaration de violation, une garantie architecturale, pas contractuelle.",catLabel:'Conformité',catBadgeClass:'bc-secu',badgeClass:'badge-secu',avClass:'av-secu',author:'Équipe iD4Connect',authorInit:'i',authorRole:'Rédaction',date:'2 décembre 2025',read:'6 min',img:'https://images.unsplash.com/photo-1555949963-aa79dcee981c?w=600&q=80'},
  {id:6,cat:'technique',featured:false,title:"DataGraph : le chef d'orchestre qui ne centralise pas",excerpt:"Le DataGraph coordonne l'ensemble des DataCells sans qu'aucune cellule ne communique directement avec une autre. Traçabilité totale sans point de centralisation.",catLabel:'Technologie',catBadgeClass:'bc-tech',badgeClass:'badge-tech',avClass:'av-tech',author:'Équipe iD4Connect',authorInit:'i',authorRole:'Rédaction',date:'3 janvier 2026',read:'8 min',img:'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=600&q=80'},
  {id:7,cat:'partenaires',featured:false,title:"iD4Connect + NRB : une alliance stratégique pour le Benelux",excerpt:"Le partenariat avec NRB ouvre une nouvelle dimension en Belgique et au Luxembourg. Tour d'horizon des opportunités et des premiers déploiements.",catLabel:'Partenaires',catBadgeClass:'bc-partner',badgeClass:'badge-partner',avClass:'av-partner',author:'Équipe iD4Connect',authorInit:'i',authorRole:'Rédaction',date:'15 décembre 2025',read:'5 min',img:'https://images.unsplash.com/photo-1521791136064-7986c2920216?w=600&q=80'},
  {id:8,cat:'actu',featured:false,title:"iD4Connect franchit le cap de la version 2.60",excerpt:"Refonte complète de l'interface, nouveau wizard DataCell, centre de conformité intégré et support multilingue FR/EN/ES. Tour d'horizon des nouveautés de cette version majeure.",catLabel:'Actualités',catBadgeClass:'bc-actu',badgeClass:'badge-actu',avClass:'av-actu',author:'Équipe iD4Connect',authorInit:'i',authorRole:'Rédaction',date:'10 janvier 2026',read:'4 min',img:'https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600&q=80'},
];

let currentCat='all';let currentSearch='';
function getFiltered(){return ARTICLES.filter(a=>{const matchCat=currentCat==='all'||a.cat===currentCat;const q=currentSearch.toLowerCase();const matchSearch=!q||a.title.toLowerCase().includes(q)||a.excerpt.toLowerCase().includes(q)||a.catLabel.toLowerCase().includes(q);return matchCat&&matchSearch;});}
function metaIcons(date,read){return `<span><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M5 1v4M11 1v4M2 7h12"/></svg>${date}</span><span><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 1"/></svg>${read}</span>`;}
function renderFeatured(){const sec=document.getElementById('featured-section');const showFeat=currentCat==='all'&&!currentSearch;const feat=ARTICLES.find(a=>a.featured);if(!showFeat||!feat){sec.style.display='none';return;}sec.style.display='block';document.getElementById('feat-img').innerHTML=`<img src="${feat.img}" alt="${feat.title}" loading="lazy">`;document.getElementById('feat-badge').textContent=feat.catLabel;document.getElementById('feat-badge').className=`feat-cat-badge ${feat.catBadgeClass}`;document.getElementById('feat-meta').innerHTML=metaIcons(feat.date,feat.read);document.getElementById('feat-title').textContent=feat.title;document.getElementById('feat-excerpt').textContent=feat.excerpt;document.getElementById('feat-author').innerHTML=`<div class="feat-avatar ${feat.avClass}">${feat.authorInit.toUpperCase()}</div><div><div class="feat-author-name">${feat.author}</div><div class="feat-author-role">${feat.authorRole}</div></div>`;}
function renderGrid(){const grid=document.getElementById('blog-grid');const noRes=document.getElementById('no-results');const filtered=getFiltered();const items=(currentCat==='all'&&!currentSearch)?filtered.filter(a=>!a.featured):filtered;if(!items.length){grid.innerHTML='';noRes.style.display='block';return;}noRes.style.display='none';grid.innerHTML=items.map(a=>`<a href="article.html" class="blog-card"><div class="card-img"><img src="${a.img}" alt="${a.title}" loading="lazy"><span class="card-badge ${a.badgeClass}">${a.catLabel}</span></div><div class="card-body"><div class="card-meta-row">${metaIcons(a.date,a.read)}</div><h3 class="card-title">${a.title}</h3><p class="card-excerpt">${a.excerpt}</p><div class="card-author"><div class="card-avatar ${a.avClass}">${a.authorInit.toUpperCase()}</div><span class="card-author-name">${a.author}</span></div></div></a>`).join('');}
function render(){renderFeatured();renderGrid();}
document.getElementById('filter-row').addEventListener('click',e=>{const btn=e.target.closest('.ftag');if(!btn)return;document.querySelectorAll('.ftag').forEach(t=>t.classList.remove('active'));btn.classList.add('active');currentCat=btn.dataset.cat;render();});
document.getElementById('search-input').addEventListener('input',e=>{currentSearch=e.target.value.trim();render();});
render();

async function loadComp(id,file){try{const r=await fetch(file);if(!r.ok)return;const html=await r.text();const el=document.getElementById(id);if(!el)return;el.innerHTML=html;el.querySelectorAll('script').forEach(s=>{const ns=document.createElement('script');ns.textContent=s.textContent;document.head.appendChild(ns);});if(typeof initHeader==='function')initHeader();}catch(e){}}
window.addEventListener('load',async()=>{
  await loadComp('hdr-ph','header.html');
  await loadComp('ftr-ph','footer.html');
  document.addEventListener('themeChange',e=>{document.documentElement.setAttribute('data-theme',e.detail);document.body.setAttribute('data-theme',e.detail);});
});
</script>
</body>
</html>
